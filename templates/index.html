<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTREIA</title>
    
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='avatar_icon.png') }}">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ASTREIA">
    <meta name="theme-color" content="#ff69b4">

    <style>
        body { 
            margin: 0; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: linear-gradient(135deg, #fce4ec 0%, #ffe0b2 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        @media (min-width: 500px) {
            .app-container { border-radius: 30px; height: 90vh; }
        }

        .avatar-container { 
            flex: 1; 
            overflow: hidden; 
            background: #000;
            display: flex;
            justify-content: center;
        }
        .avatar-container img { 
            height: 100%; 
            width: 100%; 
            object-fit: cover; 
        }

        .chat-container { 
            height: 38%; 
            background: white; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box;
        }
        .message-area { 
            flex: 1; 
            overflow-y: auto; 
            margin-bottom: 15px; 
            font-size: 18px; 
            line-height: 1.4; 
            color: #444; 
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .input-area { 
            display: flex; 
            gap: 10px; 
            align-items: center; 
            height: 50px; /* 入力エリアの高さを固定 */
        }

        /* マイクボタンを「正円」に固定する魔法の設定 */
        .mic-button { 
            background: #f06292; 
            width: 50px;      /* 横幅固定 */
            height: 50px;     /* 縦幅固定 */
            min-width: 50px;  /* 潰れ防止 */
            min-height: 50px; /* 伸び防止 */
            border-radius: 50%; /* 正円に */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            font-size: 24px; 
            box-shadow: 0 4px 10px rgba(240, 98, 146, 0.3);
            border: none;
            padding: 0;
            flex-shrink: 0;   /* 他の要素に押されても形を保つ */
        }

        .mic-active { 
            background: #ff1744; 
            transform: scale(1.1); 
            box-shadow: 0 0 20px rgba(255, 23, 68, 0.5); 
        }

        input { 
            flex: 1; 
            height: 45px;
            padding: 0 15px; 
            border: 1px solid #eee; 
            border-radius: 25px; 
            outline: none; 
            font-size: 16px; 
            background: #f8f8f8;
            box-sizing: border-box;
        }

        .send-btn {
            background: #ff69b4;
            color: white;
            border: none;
            height: 45px;
            padding: 0 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="avatar-container">
        <img src="{{ url_for('static', filename='avatar.png') }}" alt="ASTREIA">
    </div>

    <div class="chat-container">
        <div class="message-area" id="chat-box">"Tap the mic and say Hi!"</div>
        <div class="input-area">
            <button class="mic-button" id="mic-btn">🎤</button>
            <input type="text" id="user-input" placeholder="Message...">
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const micBtn = document.getElementById('mic-btn');

    function speak(text) {
        window.speechSynthesis.cancel();
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = 'en-US';
        uttr.rate = 1.0;
        window.speechSynthesis.speak(uttr);
    }

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';
    recognition.interimResults = false;

    micBtn.onclick = () => {
        recognition.start();
        micBtn.classList.add('mic-active');
        chatBox.innerText = "Listening...";
    };

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        userInput.value = transcript;
        micBtn.classList.remove('mic-active');
        sendMessage();
    };

    recognition.onerror = () => {
        micBtn.classList.remove('mic-active');
        chatBox.innerText = "Try again...";
    };

    async function sendMessage() {
        const text = userInput.value;
        if (!text) return;
        userInput.value = '';
        chatBox.innerText = "Thinking...";
        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await response.json();
            chatBox.innerText = data.response;
            speak(data.response);
        } catch (e) {
            chatBox.innerText = "Connection error...";
        }
    }
</script>

</body>
</html>
