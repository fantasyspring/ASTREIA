<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTREIA</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff; display: flex; flex-direction: column; overflow: hidden;
        }

        /* アバターエリア */
        .avatar-area {
            width: 100%; flex: 1; overflow: hidden; position: relative;
        }
        #avatar-img { width: 100%; height: 100%; object-fit: cover; }

        /* 吹き出し */
        #display-text {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.95);
            padding: 15px 25px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 80%; text-align: center; font-size: 1.1rem;
            display: none; z-index: 10;
        }

        /* 操作エリア */
        .guide-text { text-align: center; padding: 10px 0; font-size: 16px; color: #888; }
        .ui-container {
            padding: 10px 20px 40px; display: flex; align-items: center; gap: 10px;
        }

        /* マイクボタンのアニメーション */
        #mic-btn {
            width: 50px; height: 50px; background-color: #f06292;
            border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 24px; color: white; transition: 0.3s;
        }
        #mic-btn.active {
            background-color: #ff1744;
            animation: pulse 1.2s infinite;
            box-shadow: 0 0 0 10px rgba(255, 23, 68, 0.2);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        #user-input {
            flex-grow: 1; height: 48px; border-radius: 25px; border: 1px solid #eee;
            background-color: #f8f8f8; padding: 0 20px; font-size: 16px; outline: none;
        }

        #send-btn {
            background-color: #f06292; color: white; border: none;
            padding: 10px 24px; border-radius: 25px; font-weight: bold;
        }

        /* セットアップ用 */
        #setup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100;
            display: none;
        }
    </style>
</head>
<body>

<div class="avatar-area">
    <img id="avatar-img" src="{{ url_for('static', filename='avatar_icon.png') }}">
    <div id="display-text"></div>
</div>

<div class="guide-text">"Tap the mic and say Hi!"</div>

<div class="ui-container">
    <button id="mic-btn" onclick="startRecognition()">🎤</button>
    <input type="text" id="user-input" placeholder="Message...">
    <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
    const display = document.getElementById('display-text');
    const input = document.getElementById('user-input');
    const micBtn = document.getElementById('mic-btn');

    // --- 音声合成の初期化（iPhone対策：一度空の音を鳴らす） ---
    function initAudio() {
        const silent = new SpeechSynthesisUtterance("");
        window.speechSynthesis.speak(silent);
    }

    // --- 音声認識 ---
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';
    recognition.interimResults = false;

    function startRecognition() {
        initAudio(); // タップした瞬間に音声を有効化
        try {
            recognition.start();
            micBtn.classList.add('active');
            input.placeholder = "Listening...";
        } catch (e) { console.log("Recognition already started"); }
    }

    recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        input.value = text;
        sendMessage();
    };

    recognition.onend = () => {
        micBtn.classList.remove('active');
        input.placeholder = "Message...";
    };

    async function sendMessage() {
        const text = input.value;
        if (!text) return;

        display.style.display = 'block';
        display.innerText = "Thinking...";
        input.value = "";
        
        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text})
            });
            const data = await response.json();
            
            display.innerText = data.response;
            speak(data.response);
        } catch (e) {
            display.innerText = "Error...";
        }
    }

    function speak(text) {
        // 全ての音声を一旦止めてから再生
        window.speechSynthesis.cancel();
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = 'en-US';
        uttr.rate = 1.0;
        uttr.pitch = 1.1; // 17歳っぽく少し高めに
        window.speechSynthesis.speak(uttr);
    }
</script>
</body>
</html>
