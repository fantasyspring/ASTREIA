<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTREIA</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff; color: #333;
            display: flex; flex-direction: column;
        }

        /* 上部のアバター画像エリア（画像に忠実に） */
        .avatar-area {
            width: 100%;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        #avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 画像全体を綺麗に表示 */
        }

        /* ガイドメッセージ */
        .guide-text {
            text-align: center;
            padding: 20px 0;
            font-size: 18px;
            color: #666;
            background: #fff;
        }

        /* 下部の操作エリア */
        .ui-container {
            padding: 10px 20px 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
        }

        /* ピンクのマイクボタン（画像の位置と色） */
        #mic-btn {
            width: 45px; height: 45px;
            background-color: #ff69b4; /* 画像のピンク色 */
            border-radius: 50%;
            border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(255, 105, 180, 0.4);
            flex-shrink: 0;
        }
        #mic-btn.active { background-color: #ff1493; transform: scale(1.1); }

        /* 入力ボックス */
        #user-input {
            flex-grow: 1;
            height: 45px;
            border-radius: 25px;
            border: 1px solid #eee;
            background-color: #f8f8f8;
            padding: 0 20px;
            font-size: 16px;
            outline: none;
        }

        /* 送信ボタン（画像に合わせてピンク） */
        #send-btn {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 吹き出し（必要に応じて表示） */
        #display-text {
            position: absolute;
            top: 60%; left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.9);
            padding: 15px 25px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 80%;
            display: none; /* 会話が始まったら表示 */
        }
    </style>
</head>
<body>

<div class="avatar-area">
    <!-- Masterの画像パスを指定 -->
    <img id="avatar-img" src="{{ url_for('static', filename='avatar_icon.png') }}" alt="ASTREIA">
    <div id="display-text"></div>
</div>

<div class="guide-text">"Tap the mic and say Hi!"</div>

<div class="ui-container">
    <button id="mic-btn" onclick="startRecognition()">🎤</button>
    <input type="text" id="user-input" placeholder="Message...">
    <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
    const display = document.getElementById('display-text');
    const input = document.getElementById('user-input');

    // 音声認識
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';

    function startRecognition() {
        recognition.start();
        document.getElementById('mic-btn').classList.add('active');
    }

    recognition.onresult = (event) => {
        document.getElementById('mic-btn').classList.remove('active');
        input.value = event.results[0][0].transcript;
        sendMessage();
    };

    async function sendMessage() {
        const text = input.value;
        if (!text) return;

        display.style.display = 'block';
        display.innerText = "Thinking...";
        
        const response = await fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: text})
        });
        const data = await response.json();
        
        display.innerText = data.response;
        speak(data.response);
        input.value = "";
    }

    function speak(text) {
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = 'en-US';
        window.speechSynthesis.speak(uttr);
    }
</script>

</body>
</html>
