<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTREIA - English Partner</title>
    <style>
        body {
            margin: 0; background: #0f0c29; color: white;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; height: 100vh;
        }
        /* アバター：17歳の彼女（固定） */
        .avatar-box {
            position: relative; width: 300px; height: 300px; margin-top: 40px;
        }
        #avatar-img {
            width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
            border: 4px solid #00f2fe; box-shadow: 0 0 20px #00f2fe;
            animation: breathe 4s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        /* チャット表示 */
        #display {
            width: 90%; max-width: 500px; height: 150px; margin-top: 30px;
            padding: 15px; background: rgba(255,255,255,0.1);
            border-radius: 15px; backdrop-filter: blur(10px);
            overflow-y: auto; text-align: center; font-size: 1.1rem;
        }
        /* 操作エリア */
        .controls {
            position: fixed; bottom: 40px; width: 100%;
            display: flex; justify-content: center; align-items: center; gap: 20px;
        }
        .btn-mic {
            width: 80px; height: 80px; border-radius: 50%; border: none;
            background: #ff4b2b; color: white; font-size: 30px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255,75,43,0.4); transition: 0.3s;
        }
        .btn-mic.recording { background: #00ff00; transform: scale(1.1); }
    </style>
</head>
<body>

<div class="avatar-box">
    <!-- ここに17歳のアバター画像URLを入れてください -->
    <img id="avatar-img" src="https://via.placeholder.com/400x400?text=ASTREIA+17" alt="ASTREIA">
</div>

<div id="display">Tap the mic and talk to me!</div>

<div class="controls">
    <button id="mic-btn" class="btn-mic" onclick="toggleMic()">🎤</button>
</div>

<script>
    const display = document.getElementById('display');
    const micBtn = document.getElementById('mic-btn');
    
    // 音声認識(STT)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';

    function toggleMic() {
        recognition.start();
        micBtn.classList.add('recording');
        display.innerText = "Listening...";
    }

    recognition.onresult = async (event) => {
        micBtn.classList.remove('recording');
        const userText = event.results[0][0].transcript;
        display.innerHTML = `<strong>You:</strong> ${userText}<br>...`;

        // Pythonへ送信
        const response = await fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: userText})
        });
        const data = await response.json();
        
        // 返答表示と音声合成
        display.innerHTML = `<strong>ASTREIA:</strong> ${data.response}`;
        speak(data.response);
    };

    // 音声合成(TTS)
    function speak(text) {
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = 'en-US';
        uttr.rate = 1.0;
        window.speechSynthesis.speak(uttr);
    }
</script>

</body>
</html>
