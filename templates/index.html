<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTREIA - Genesis OS</title>
    <style>
        :root { 
            --primary-blue: #1a73e8; 
            --beach-gradient: linear-gradient(135deg, #e0f7fa 0%, #fff9c4 50%, #ffe0b2 100%);
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--beach-gradient); 
            margin: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; perspective: 1000px;
        }

        /* --- 3Dアバター表示ユニット --- */
        .avatar-viewport {
            position: relative; width: 280px; height: 280px;
            margin: 0 auto 30px; transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .avatar-3d-card {
            width: 100%; height: 100%; border-radius: 40px;
            background: url('/static/avatar.png') center/cover; /* 確実に存在する画像を指定 */
            border: 8px solid white;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateZ(0deg); }
            50% { transform: translateY(-15px) rotateZ(1deg); }
        }

        /* セットアップ画面 */
        #setup-modal { 
            position: fixed; inset: 0; background: var(--beach-gradient); 
            z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        .setup-card {
            background: rgba(255, 255, 255, 0.9); padding: 40px 30px;
            border-radius: 40px; backdrop-filter: blur(20px);
            width: 85%; max-width: 400px; text-align: center;
        }

        .age-selector { display: flex; gap: 10px; margin: 20px 0; justify-content: center; }
        .age-btn { 
            flex: 1; padding: 12px; border: 2px solid #fff; border-radius: 20px; 
            background: white; cursor: pointer; font-weight: bold; color: #90a4ae;
        }
        .age-btn.active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }

        .setup-input { 
            width: 100%; padding: 18px; margin-bottom: 20px; border: none; 
            border-radius: 20px; background: #f1f8ff; font-size: 1.1rem; text-align: center; box-sizing: border-box;
        }

        .start-btn { 
            width: 100%; padding: 20px; border-radius: 40px; border: none;
            background: linear-gradient(135deg, #1a73e8, #64b5f6); color: white;
            font-size: 1.3rem; font-weight: 800; cursor: pointer;
        }

        /* --- メインチャット画面 --- */
        #main-app {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            background: var(--beach-gradient);
        }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px;
        }

        .msg { padding: 15px 20px; border-radius: 25px; max-width: 85%; line-height: 1.4; font-size: 1rem; }
        .user { align-self: flex-end; background: var(--primary-blue); color: white; border-bottom-right-radius: 5px; }
        .ai { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        .input-area { padding: 20px; background: white; display: flex; gap: 10px; border-top: 1px solid rgba(0,0,0,0.05); }
        #chat-input { flex: 1; padding: 15px; border: 1px solid #eee; border-radius: 25px; outline: none; font-size: 1rem; }
    </style>
</head>
<body>

{% if first_launch %}
<div id="setup-modal">
    <div class="setup-card">
        <div class="avatar-viewport" id="avatar-container">
            <div class="avatar-3d-card" id="avatar-card"></div>
        </div>
        <h2 style="color:#1a73e8; margin-bottom:5px;">GENESIS</h2>
        <input type="text" id="user-name" class="setup-input" placeholder="Your name">
        <div class="age-selector">
            <div class="age-btn active" onclick="changeAge('17', this)">17</div>
            <div class="age-btn" onclick="changeAge('30', this)">30</div>
            <div class="age-btn" onclick="changeAge('50', this)">50</div>
        </div>
        <button class="start-btn" onclick="finishSetup()">START JOURNEY</button>
    </div>
</div>
{% else %}
<div id="main-app">
    <div id="chat-window">
        <div class="msg ai">Welcome back, {{ user_data.user_name }}! How can I help you today?</div>
    </div>
    <div class="input-area">
        <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()" style="border:none; background:none; font-size:1.5rem; cursor:pointer;">🚀</button>
    </div>
</div>
{% endif %}

<script>
    let selectedAge = '17';

    // 3D回転
    document.addEventListener('mousemove', (e) => {
        const card = document.getElementById('avatar-card');
        if (!card) return;
        let xAxis = (window.innerWidth / 2 - e.pageX) / 20;
        let yAxis = (window.innerHeight / 2 - e.pageY) / 20;
        card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    function changeAge(age, btn) {
        selectedAge = age;
        document.querySelectorAll('.age-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const card = document.getElementById('avatar-card');
        // 画像がない場合を考慮し、基本は avatar.png を使う
        const img = (age === '17') ? '/static/avatar.png' : `/static/avatar_${age}.png`;
        card.style.backgroundImage = `url('${img}'), url('/static/avatar.png')`;
    }

    async function finishSetup() {
        const name = document.getElementById('user-name').value;
        if (!name) return alert("Please enter your name!");
        const res = await fetch('/setup', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name: name, age: selectedAge })
        });
        if (res.ok) window.location.reload();
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;

        appendMessage('user', text);
        input.value = '';

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            appendMessage('ai', data.response);
        } catch (e) {
            appendMessage('ai', "Error connecting to GENESIS.");
        }
    }

    function appendMessage(role, text) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }
</script>

</body>
</html>
