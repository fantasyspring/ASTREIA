<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTREIA - Your English Friend</title>
    <style>
        :root { --primary-blue: #1a73e8; --accent-yellow: #fff9c4; --bg-gray: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-gray); margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* メインコンテナ */
        .app-container { width: 100%; max-width: 450px; background: white; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* ヘッダー */
        .header { padding: 15px; text-align: center; border-bottom: 1px solid #eee; background: white; z-index: 10; }
        .avatar-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary-blue); object-fit: cover; }
        
        /* チャットエリア */
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #fafafa; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; line-height: 1.4; font-size: 15px; }
        .user { align-self: flex-end; background: var(--primary-blue); color: white; border-bottom-right-radius: 2px; }
        .astreia { align-self: flex-start; background: var(--accent-yellow); color: #444; border-bottom-left-radius: 2px; }

        /* 操作エリア */
        .controls { padding: 20px; border-top: 1px solid #eee; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        #mic-btn { width: 70px; height: 70px; border-radius: 50%; border: none; background: var(--primary-blue); color: white; font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(26,115,232,0.3); transition: 0.3s; }
        #mic-btn.recording { background: #ea4335; transform: scale(1.1); animation: pulse 1.5s infinite; }

        /* 初期設定モーダル */
        #setup-modal { position: absolute; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .setup-content h2 { color: var(--primary-blue); margin-bottom: 20px; }
        .setup-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .age-selector { display: flex; gap: 10px; margin: 20px 0; }
        .age-btn { padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; background: white; }
        .age-btn.active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }
        .start-btn { background: var(--primary-blue); color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 18px; cursor: pointer; margin-top: 20px; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(234, 67, 53, 0); } 100% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0); } }
    </style>
</head>
<body>

<div class="app-container">
    {% if first_launch %}
    <div id="setup-modal">
        <div class="setup-content">
            <h2>Welcome to ASTREIA</h2>
            <p>Tell me about yourself, Friend!</p>
            <input type="text" id="user-name" class="setup-input" placeholder="Your Name">
            <p>Choose my age:</p>
            <div class="age-selector">
                <div class="age-btn active" onclick="selectAge('17', this)">17 (School)</div>
                <div class="age-btn" onclick="selectAge('30', this)">30 (Adult)</div>
                <div class="age-btn" onclick="selectAge('50', this)">50 (Mentor)</div>
            </div>
            <button class="start-btn" onclick="finishSetup()">Start Conversation</button>
        </div>
    </div>
    {% endif %}

    <div class="header">
        <img src="{{ url_for('static', filename='images/' + avatar_image) }}" class="avatar-img" id="main-avatar">
        <div style="font-weight: bold; margin-top: 5px;">ASTREIA</div>
        <small id="status-text">Santa Monica, CA</small>
    </div>

    <div id="chat-box">
        <div class="msg astreia">Hi there! Tap the mic and let's talk in English! ✨</div>
    </div>

    <div class="controls">
        <button id="mic-btn">🎤</button>
        <div style="font-size: 12px; color: #888;">Tap to Speak</div>
    </div>
</div>

<script>
    let selectedAge = "17";
    const micBtn = document.getElementById('mic-btn');
    const chatBox = document.getElementById('chat-box');
    const statusText = document.getElementById('status-text');

    // 年齢選択
    function selectAge(age, btn) {
        selectedAge = age;
        document.querySelectorAll('.age-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // セットアップ完了処理
    async function finishSetup() {
        const name = document.getElementById('user-name').value || "Friend";
        const res = await fetch('/setup', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name: name, age: selectedAge })
        });
        if (res.ok) window.location.reload();
    }

    // 音声認識の設定
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        
        micBtn.addEventListener('click', () => {
            recognition.start();
            micBtn.classList.add('recording');
            statusText.innerText = "Listening... 🎤";
        });

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            addMessage(text, 'user');
            sendToAstreia(text);
        };

        recognition.onend = () => {
            micBtn.classList.remove('recording');
        };
    }

    // メッセージ送信
    async function sendToAstreia(text) {
        statusText.innerText = "Thinking... ✨";
        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            addMessage(data.response, 'astreia');
            speak(data.response);
            statusText.innerText = "Santa Monica, CA";
        } catch (e) {
            statusText.innerText = "Connection Error";
        }
    }

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function speak(text) {
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = 'en-US';
        window.speechSynthesis.speak(uttr);
    }
</script>

</body>
</html>
