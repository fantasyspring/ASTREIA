<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTREIA - English Prototype</title>
    <style>
        :root {
            --primary-bg: #1a1a2e;
            --glass-bg: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--primary-bg);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 背景：サンタモニカの海（仮） */
        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            z-index: -1;
        }

        /* アバター：呼吸（Idle）アニメーション */
        .avatar-container {
            position: relative;
            width: 80%; max-width: 400px;
            margin-top: 50px;
            perspective: 1000px;
        }

        #avatar {
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            /* 呼吸を表現する微細なアニメーション */
            animation: breathe 4s ease-in-out infinite;
            transition: transform 0.1s ease-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1.0); }
            50% { transform: scale(1.02); }
        }

        /* UI: メッセージエリア */
        #chat-window {
            position: absolute; bottom: 100px;
            width: 90%; max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px; color: white;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.2);
        }

        #input-area {
            position: fixed; bottom: 20px;
            width: 90%; display: flex; gap: 10px;
        }

        input {
            flex: 1; padding: 12px; border-radius: 25px; border: none;
            outline: none; font-size: 16px;
        }

        button {
            padding: 10px 20px; border-radius: 25px; border: none;
            background: #ff4b2b; color: white; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="background"></div>

<div class="avatar-container">
    <img id="avatar" src="YOUR_AVATAR_URL_HERE" alt="ASTREIA">
</div>

<div id="chat-window">
    <div id="display">Hello Master. Let's practice English.</div>
</div>

<div id="input-area">
    <input type="text" id="user-input" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    const avatar = document.getElementById('avatar');

    // ジャイロセンサー：傾きに合わせてわずかに視差をつける（不自然さを抑える）
    window.addEventListener('deviceorientation', (event) => {
        const x = event.beta;  // 前後
        const y = event.gamma; // 左右
        
        // 動きを制限（±10度以内）して、自然な奥行き感だけを出す
        const rotX = Math.max(-10, Math.min(10, x / 4));
        const rotY = Math.max(-10, Math.min(10, y / 4));
        
        avatar.style.transform = `rotateX(${-rotX}deg) rotateY(${rotY}deg)`;
    });

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const display = document.getElementById('display');
        if (!input.value) return;

        display.innerText = "Thinking...";
        
        // ここに既存のPython APIとの通信を入れる
        // const response = await fetch('/chat', { ... });
        // const data = await response.json();
        // display.innerText = data.response;

        input.value = "";
    }
</script>

</body>
</html>
