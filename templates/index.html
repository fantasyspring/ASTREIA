<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTREIA - Genesis OS</title>
    <style>
        :root { 
            --primary-blue: #1a73e8; 
            --beach-gradient: linear-gradient(135deg, #e0f7fa 0%, #fff9c4 50%, #ffe0b2 100%);
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--beach-gradient); 
            margin: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; perspective: 1000px; /* 3D効果の奥行き設定 */
        }

        /* --- 3Dアバター表示ユニット --- */
        .avatar-viewport {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 30px;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .avatar-3d-card {
            width: 100%;
            height: 100%;
            border-radius: 40px;
            background: url('/static/avatar_icon.png') center/cover;
            border: 8px solid white;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2), inset 0 0 20px rgba(255,255,255,0.5);
            /* 浮かんでいるようなアニメーション */
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateZ(0deg); }
            50% { transform: translateY(-15px) rotateZ(1deg); }
        }

        /* セットアップ画面の装飾 */
        #setup-modal { 
            position: absolute; inset: 0; background: var(--beach-gradient); 
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        .setup-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 30px;
            border-radius: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.1);
            width: 85%; max-width: 400px; text-align: center;
        }

        .age-selector { display: flex; gap: 10px; margin: 20px 0; justify-content: center; }
        .age-btn { 
            flex: 1; padding: 12px; border: 2px solid #fff; border-radius: 20px; 
            background: white; cursor: pointer; font-weight: bold; color: #90a4ae; transition: 0.3s;
        }
        .age-btn.active { 
            background: var(--primary-blue); color: white; border-color: var(--primary-blue);
            transform: scale(1.05); box-shadow: 0 10px 20px rgba(26,115,232,0.3);
        }

        .setup-input { 
            width: 100%; padding: 18px; margin-bottom: 20px; border: none; 
            border-radius: 20px; background: #f1f8ff; font-size: 1.1rem; text-align: center; outline: none;
        }

        .start-btn { 
            width: 100%; padding: 20px; border-radius: 40px; border: none;
            background: linear-gradient(135deg, #1a73e8, #64b5f6); color: white;
            font-size: 1.3rem; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
    </style>
</head>
<body>

<div class="app-container" style="display:none;" id="main-app">
    <!-- メインのチャット画面（ここは前回のロジックを維持） -->
</div>

{% if first_launch %}
<div id="setup-modal">
    <div class="setup-card">
        <!-- 3D回転するアバタープレビュー -->
        <div class="avatar-viewport" id="avatar-container">
            <div class="avatar-3d-card" id="avatar-card"></div>
        </div>

        <h2 style="color:#1a73e8; margin-bottom:5px;">Welcome to GENESIS</h2>
        <p style="color:#546e7a; margin-top:0;">Meet your ASTREIA</p>

        <input type="text" id="user-name" class="setup-input" placeholder="What's your name?">
        
        <div class="age-selector">
            <div class="age-btn active" onclick="changeAge('17', this)">17</div>
            <div class="age-btn" onclick="changeAge('30', this)">30</div>
            <div class="age-btn" onclick="changeAge('50', this)">50</div>
        </div>

        <button class="start-btn" onclick="finishSetup()">START JOURNEY</button>
    </div>
</div>
{% endif %}

<script>
    // --- 3D回転のロジック ---
    const container = document.getElementById('avatar-container');
    const card = document.getElementById('avatar-card');

    document.addEventListener('mousemove', (e) => {
        if (!container) return;
        
        // 画面中心からのマウス位置を計算
        let xAxis = (window.innerWidth / 2 - e.pageX) / 15;
        let yAxis = (window.innerHeight / 2 - e.pageY) / 15;

        // 真下（上向きの回転）を防ぐためにY軸の角度を制限
        // yAxisが正のときカードは上を向く。これを制限する。
        if (yAxis > 15) yAxis = 15; 
        if (yAxis < -20) yAxis = -20; 

        card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    // 年齢切り替え
    function changeAge(age, btn) {
        document.querySelectorAll('.age-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // 画像の動的切り替え（前回のロジックを継承）
        const newImg = (age === '17') ? '/static/avatar_icon.png' : `/static/avatar_icon_${age}.png`;
        card.style.backgroundImage = `url('${newImg}')`;
    }

    // セットアップ完了（Flask連携）
    async function finishSetup() {
        const name = document.getElementById('user-name').value;
        if (!name) { alert("Please enter your name!"); return; }
        
        const res = await fetch('/setup', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name: name, age: "17" }) // 年齢変数は選択に合わせて調整
        });
        if (res.ok) window.location.reload();
    }
</script>

</body>
</html>
