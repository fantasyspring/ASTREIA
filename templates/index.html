<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTREIA</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff; color: #333;
            display: flex; flex-direction: column; overflow: hidden;
        }

        .avatar-area {
            width: 100%; flex: 1; overflow: hidden; position: relative;
        }
        #avatar-img { width: 100%; height: 100%; object-fit: cover; }

        #display-text {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.95);
            padding: 15px 25px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 85%; text-align: center; font-size: 1.1rem;
            display: none; z-index: 10;
        }

        .guide-text { text-align: center; padding: 10px 0; font-size: 16px; color: #888; }

        .ui-container { padding: 5px 20px 35px; display: flex; align-items: center; gap: 12px; }

        #mic-btn {
            width: 55px; height: 55px; background-color: #f06292;
            border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 12px rgba(240, 98, 146, 0.4);
            flex-shrink: 0; font-size: 26px; color: white;
        }
        #mic-btn.active { background-color: #e91e63; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        #user-input {
            flex-grow: 1; height: 50px; border-radius: 25px; border: 1px solid #eee;
            background-color: #f8f8f8; padding: 0 20px; font-size: 16px; outline: none;
        }

        #send-btn { background-color: #f06292; color: white; border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; }

        #setup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 100;
            display: none;
        }
        .setup-box { background: white; padding: 30px; border-radius: 25px; width: 85%; text-align: center; box-sizing: border-box; }
        .setup-box h3 { color: #e91e63; margin-bottom: 20px; }
        .setup-box input { width: 90%; padding: 15px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #ddd; font-size: 18px; text-align: center; }
        .step { display: none; }
        .step.active { display: block; }
    </style>
</head>
<body>

<div class="avatar-area">
    <img id="avatar-img" src="{{ url_for('static', filename='avatar_icon.png') }}">
    <div id="display-text"></div>
</div>

<div class="guide-text">"Tap the mic and say Hi!"</div>

<div class="ui-container">
    <button id="mic-btn" onclick="startRecognition()">🎤</button>
    <input type="text" id="user-input" placeholder="Message...">
    <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<div id="setup-overlay">
    <div class="setup-box">
        <div id="step1" class="step active">
            <h3>Step 1</h3>
            <p>What's your name?</p>
            <input type="text" id="setup-user-name" placeholder="Master Name">
            <button id="send-btn" style="width:100%" onclick="nextStep()">Next</button>
        </div>
        <div id="step2" class="step">
            <h3>Step 2</h3>
            <p>What's my name?</p>
            <input type="text" id="setup-ai-name" placeholder="Avatar Name">
            <button id="send-btn" style="width:100%" onclick="completeSetup()">Start Chat</button>
        </div>
    </div>
</div>

<script>
    const display = document.getElementById('display-text');
    const input = document.getElementById('user-input');
    const micBtn = document.getElementById('mic-btn');

    let audioUnlocked = false;
    function unlockAudio() {
        if (!audioUnlocked) {
            const silent = new SpeechSynthesisUtterance("");
            window.speechSynthesis.speak(silent);
            audioUnlocked = true;
        }
    }

    {% if first_launch %}
    document.getElementById('setup-overlay').style.display = 'flex';
    {% endif %}

    function nextStep() {
        unlockAudio();
        const userName = document.getElementById('setup-user-name').value;
        if (!userName) { alert("Please enter your name!"); return; }
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
    }

    async function completeSetup() {
        unlockAudio();
        const userName = document.getElementById('setup-user-name').value;
        const aiName = document.getElementById('setup-ai-name').value || "ASTREIA";
        await fetch('/setup', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: userName, ai_name: aiName})
        });
        document.getElementById('setup-overlay').style.display = 'none';
        display.style.display = 'block';
        const msg = `Hi ${userName}! I'm ${aiName}. Let's talk!`;
        display.innerText = msg;
        speak(msg);
    }

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';
    function startRecognition() {
        unlockAudio();
        try { recognition.start(); micBtn.classList.add('active'); } catch (e) {}
    }
    recognition.onresult = (event) => {
        input.value = event.results[0][0].transcript;
        sendMessage();
    };
    recognition.onend = () => micBtn.classList.remove('active');

    async function sendMessage() {
        unlockAudio();
        const text = input.value;
        if (!text) return;
        display.style.display = 'block';
        display.innerText = "...";
        input.value = "";
        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text})
            });
            const data = await response.json();
            display.innerText = data.response;
            speak(data.response);
        } catch (e) { display.innerText = "Error..."; }
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const uttr = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices();
        const bestVoice = voices.find(v => v.name.includes('Samantha')) || 
                         voices.find(v => v.lang.includes('en-US') && v.name.includes('Female')) ||
                         voices.find(v => v.lang.includes('en-US'));

        if (bestVoice) { uttr.voice = bestVoice; }
        uttr.lang = 'en-US';
        uttr.rate = 1.0;  
        uttr.pitch = 1.1; 
        window.speechSynthesis.speak(uttr);
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }
</script>
</body>
</html>
